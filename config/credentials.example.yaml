# ============================================================================
#  LOGIN CREDENTIALS  --  provided ONCE, reused for every application.
#  Copy this file to "config/credentials.yaml" (gitignored) and edit it.
#
#  The agent creates/uses an account on each job portal with these details.
#  Most job boards (Greenhouse, Lever, Workday, etc.) ask for an email +
#  password to create a candidate account. The agent reuses the same login
#  everywhere so you only enter it here once.
#
#  SECURITY: this file stays on your machine and is gitignored. Never commit it.
# ============================================================================

# The default email/password used to create or sign in to candidate accounts.
default:
  email: "jane.doe@example.com"
  password: "change-this-to-a-strong-password"

# Optional: site-specific overrides. The key is matched against the job URL's
# domain. Useful when a particular site needs a different login.
overrides:
  # "linkedin.com":
  #   email: "jane.doe@example.com"
  #   password: "my-linkedin-password"
  # "myworkdayjobs.com":
  #   email: "jane.doe@example.com"
  #   password: "my-workday-password"
